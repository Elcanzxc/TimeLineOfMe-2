name: Deploy to AWS EC2

on:
  push:
    branches:
      - main # Срабатывает при пуше в основную ветку

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Copy docker-compose via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "docker-compose.prod.yml,src/TLOM.API/Dockerfile,src/TLOM.Client/Dockerfile,src/TLOM.Client/nginx.conf"
        target: "~/tlom"

    - name: Transfer Project Code via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "."
        target: "~/tlom"
        rm: true

    - name: Execute Docker Compose on EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -e
          cd ~/tlom
          # Создаем .env файл из секретов GitHub
          echo "EC2_HOST=${{ secrets.EC2_HOST }}" > .env
          echo "DB_CONNECTION_STRING=${{ secrets.DB_CONNECTION_STRING }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
          echo "SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}" >> .env
          echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" >> .env
          echo "SMTP_FROM_EMAIL=${{ secrets.SMTP_FROM_EMAIL }}" >> .env
          echo "TMDB_BEARER_TOKEN=${{ secrets.TMDB_BEARER_TOKEN }}" >> .env
          echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" >> .env
          echo "GOOGLE_BOOKS_API_KEY=${{ secrets.GOOGLE_BOOKS_API_KEY }}" >> .env
          echo "SPOTIFY_CLIENT_ID=${{ secrets.SPOTIFY_CLIENT_ID }}" >> .env
          echo "SPOTIFY_CLIENT_SECRET=${{ secrets.SPOTIFY_CLIENT_SECRET }}" >> .env
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
          echo "AWS_REGION=${{ secrets.AWS_REGION }}" >> .env
          echo "AWS_BUCKET_NAME=${{ secrets.AWS_BUCKET_NAME }}" >> .env
          
          docker-compose -f docker-compose.prod.yml down || true
          
          # Install certbot and get SSL cert if not exists
          if [ ! -f "/etc/letsencrypt/live/${{ secrets.EC2_HOST }}/fullchain.pem" ]; then
            sudo yum install -y certbot || true
            sudo certbot certonly --standalone -d ${{ secrets.EC2_HOST }} --agree-tos --email ${{ secrets.SMTP_FROM_EMAIL }} --non-interactive
          fi
          
          # Copy certs to a simple directory for Docker bind-mount
          sudo mkdir -p /etc/letsencrypt/ssl-certs
          sudo cp /etc/letsencrypt/live/${{ secrets.EC2_HOST }}/fullchain.pem /etc/letsencrypt/ssl-certs/fullchain.pem
          sudo cp /etc/letsencrypt/live/${{ secrets.EC2_HOST }}/privkey.pem /etc/letsencrypt/ssl-certs/privkey.pem
          sudo chmod 644 /etc/letsencrypt/ssl-certs/*.pem
          
          docker-compose -f docker-compose.prod.yml build
          docker-compose -f docker-compose.prod.yml up -d
          docker system prune -f
