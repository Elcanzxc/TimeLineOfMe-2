version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "TlomDev@2026!"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: src/TLOM.API/Dockerfile
    ports:
      - "5170:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=TLOM;User Id=sa;Password=TlomDev@2026!;TrustServerCertificate=True;
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=TLOM.API
      - Jwt__Audience=TLOM.Client
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS__BucketName=${AWS_BUCKET_NAME}
      - Smtp__Username=${SMTP_USERNAME}
      - Smtp__Password=${SMTP_PASSWORD}
      - Smtp__FromEmail=${SMTP_FROM_EMAIL}
      - Smtp__Host=smtp.gmail.com
      - Smtp__Port=587
      - Smtp__EnableSsl=true
      - Google__ClientId=${GOOGLE_CLIENT_ID}
      - Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
      - ExternalApis__Tmdb__BearerToken=${TMDB_BEARER_TOKEN}
      - ExternalApis__Tmdb__ApiKey=${TMDB_API_KEY}
      - ExternalApis__GoogleBooks__ApiKey=${GOOGLE_BOOKS_API_KEY}
      - ExternalApis__Spotify__ClientId=${SPOTIFY_CLIENT_ID}
      - ExternalApis__Spotify__ClientSecret=${SPOTIFY_CLIENT_SECRET}
    depends_on:
      - db

  client:
    build:
      context: src/TLOM.Client
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  sql_data:
