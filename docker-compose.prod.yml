

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "TlomProd@2026!"
    expose:
      - "1433"
    volumes:
      - sql_data:/var/opt/mssql
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: src/TLOM.API/Dockerfile
    ports:
      - "5170:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=db;Database=TLOM;User Id=sa;Password=TlomProd@2026!;TrustServerCertificate=True;
      - ClientUrl=http://${EC2_HOST}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=TLOM.API
      - Jwt__Audience=TLOM.Client
      - Google__ClientId=${GOOGLE_CLIENT_ID}
      - Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
      - Smtp__Username=${SMTP_USERNAME}
      - Smtp__Password=${SMTP_PASSWORD}
      - Smtp__FromEmail=${SMTP_FROM_EMAIL}
      - Smtp__Host=smtp.gmail.com
      - Smtp__Port=587
      - Smtp__EnableSsl=true
      - ExternalApis__Tmdb__BearerToken=${TMDB_BEARER_TOKEN}
      - ExternalApis__Tmdb__ApiKey=${TMDB_API_KEY}
      - ExternalApis__GoogleBooks__ApiKey=${GOOGLE_BOOKS_API_KEY}
      - ExternalApis__Spotify__ClientId=${SPOTIFY_CLIENT_ID}
      - ExternalApis__Spotify__ClientSecret=${SPOTIFY_CLIENT_SECRET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS__BucketName=${AWS_BUCKET_NAME}
    depends_on:
      - db
    restart: unless-stopped

  client:
    build:
      context: src/TLOM.Client
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sql_data:
